<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STORY PRO - Login</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        :root { --viber: #7360f2; --bg: #000; --card: #0d0d0d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-box { background: var(--card); padding: 30px; border-radius: 25px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #1a1a1a; }
        h1 { font-size: 26px; margin-bottom: 20px; color: white; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #222; background: #111; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--viber); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        .divider { margin: 20px 0; font-size: 12px; color: #444; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="login-box">
    <h1>STORY PRO</h1>
    
    <div id="login-form">
        <input id="user-input" type="text" placeholder="Email or Admin ID">
        <input id="pass-input" type="password" placeholder="Password (Only for Admin)" id="admin-pass-field">
        
        <button id="main-btn" onclick="handleIdentify()">Continue</button>
        
        <div class="divider">OR</div>
        
        <button style="background:white; color:black;" onclick="loginWithGoogle()">
            Continue with Google
        </button>
    </div>

    <div id="otp-section" class="hidden">
        <p style="font-size:13px; color:var(--viber);">ඔබේ විද්‍යුත් තැපෑලට (Email) එවූ OTP කේතය ඇතුළත් කරන්න.</p>
        <input id="otp-code" type="text" placeholder="6-Digit Code">
        <button onclick="verifyEmailOTP()">Verify & Login</button>
    </div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyDJ-9NkKH2GCkkLTr6Xr1Y7rz_bj3qJdF0",
      authDomain: "story-ceca0.firebaseapp.com",
      projectId: "story-ceca0",
      storageBucket: "story-ceca0.firebasestorage.app",
      messagingSenderId: "820075788039",
      appId: "1:820075788039:web:421fd811a4b4a3249a77a2"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Admin Credentials (සඟවා ඇත)
    const ADMIN_ID = "0712729189"; 
    const ADMIN_PW = "Thilinak9411@";

    function handleIdentify() {
        const input = document.getElementById('user-input').value.trim();
        const pass = document.getElementById('pass-input').value.trim();

        // 1. Admin පරීක්ෂාව
        if (input === ADMIN_ID && pass === ADMIN_PW) {
            alert("Welcome Admin!");
            window.location.href = "admin_panel.html";
            return;
        }

        // 2. සාමාන්‍ය පරිශීලක (Email OTP)
        if (input.includes("@")) {
            sendEmailOTP(input);
        } else {
            alert("කරුණාකර නිවැරදි Email ලිපිනයක් හෝ Admin දත්ත ඇතුළත් කරන්න.");
        }
    }

    // Gmail OTP පද්ධතිය (Firebase Email Link Auth)
    function sendEmailOTP(email) {
        const actionCodeSettings = {
            url: window.location.href,
            handleCodeInApp: true
        };

        auth.sendSignInLinkToEmail(email, actionCodeSettings)
            .then(() => {
                window.localStorage.setItem('emailForSignIn', email);
                alert("Login ලින්ක් එක ඔබගේ Gmail වෙත එවන ලදී. කරුණාකර Inbox පරීක්ෂා කරන්න.");
            })
            .catch((error) => alert("Error: " + error.message));
    }

    // Google Login
    function loginWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then(() => {
            window.location.href = "main.html";
        }).catch(err => alert(err.message));
    }

    // පිටුව Load වන විට Email Link එක පරීක්ෂා කිරීම
    window.onload = function() {
        if (auth.isSignInWithEmailLink(window.location.href)) {
            let email = window.localStorage.getItem('emailForSignIn');
            if (!email) {
                email = window.prompt('කරුණාකර තහවුරු කිරීම සඳහා ඔබගේ Email එක නැවත ඇතුළත් කරන්න:');
            }
            auth.signInWithEmailLink(email, window.location.href)
                .then(() => {
                    window.localStorage.removeItem('emailForSignIn');
                    window.location.href = "main.html";
                })
                .catch((error) => alert("ලින්ක් එක වලංගු නැත."));
        }
    };
</script>

</body>
</html>
