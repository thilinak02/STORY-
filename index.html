<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STORY PRO - Login</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        :root { --viber: #7360f2; --bg: #000; --card: #0d0d0d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-box { background: var(--card); padding: 30px; border-radius: 25px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #1a1a1a; }
        h1 { font-size: 26px; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #222; background: #111; color: white; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--viber); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .footer-text { font-size: 11px; color: #333; margin-top: 20px; }
    </style>
</head>
<body>

<div class="login-box">
    <h1>STORY PRO</h1>
    <p style="font-size:13px; color:#aaa;">Email එක හෝ Admin ID ඇතුළත් කරන්න</p>
    
    <div id="login-form">
        <input id="main-input" type="text" placeholder="Email or Admin ID">
        <input id="pass-input" type="password" placeholder="Password (Only for Admin)">
        <button onclick="processLogin()">Continue</button>
    </div>

    <div class="footer-text">Secure Access System v3.0</div>
</div>

<script>
    // ඔබගේ Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDJ-9NkKH2GCkkLTr6Xr1Y7rz_bj3qJdF0",
      authDomain: "story-ceca0.firebaseapp.com",
      projectId: "story-ceca0",
      storageBucket: "story-ceca0.firebasestorage.app",
      messagingSenderId: "820075788039",
      appId: "1:820075788039:web:421fd811a4b4a3249a77a2"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // ඔබගේ රහසිගත Admin දත්ත
    const ADMIN_ID = "0712729189"; 
    const ADMIN_PW = "Thilinak9411@";

    function processLogin() {
        const idVal = document.getElementById('main-input').value.trim();
        const pwVal = document.getElementById('pass-input').value.trim();

        // 1. Admin දත්ත පරීක්ෂාව
        if (idVal === ADMIN_ID && pwVal === ADMIN_PW) {
            alert("Welcome Admin!");
            window.location.href = "admin_panel.html"; 
            return;
        }

        // 2. සාමාන්‍ය පරිශීලක - Gmail OTP (Email Link)
        if (idVal.includes("@")) {
            const actionCodeSettings = {
                url: window.location.href, // ආපසු පැමිණිය යුතු පිටුව
                handleCodeInApp: true
            };

            auth.sendSignInLinkToEmail(idVal, actionCodeSettings)
                .then(() => {
                    window.localStorage.setItem('emailForSignIn', idVal);
                    alert("ලොග් වීමේ ලින්ක් එක ඔබගේ Gmail වෙත එවන ලදී. කරුණාකර Inbox පරීක්ෂා කරන්න.");
                })
                .catch(err => alert("දෝෂයකි: " + err.message));
        } else {
            alert("කරුණාකර නිවැරදි Email එකක් හෝ Admin දත්ත ඇතුළත් කරන්න.");
        }
    }

    // Gmail එකේ ඇති ලින්ක් එක ක්ලික් කළ විට ලොග් වීම සම්පූර්ණ කිරීම
    window.onload = function() {
        if (auth.isSignInWithEmailLink(window.location.href)) {
            let email = window.localStorage.getItem('emailForSignIn');
            if (!email) {
                email = window.prompt('කරුණාකර තහවුරු කිරීම සඳහා ඔබගේ Email එක නැවත ඇතුළත් කරන්න:');
            }
            auth.signInWithEmailLink(email, window.location.href)
                .then(() => {
                    window.localStorage.removeItem('emailForSignIn');
                    window.location.href = "main.html"; // සාමාන්‍ය පරිශීලක පිටුව
                })
                .catch(err => alert("ලින්ක් එකේ ගැටලුවකි."));
        }
    };
</script>

</body>
</html>
