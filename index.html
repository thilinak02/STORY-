<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STORY PRO - Master Edition</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        :root { --viber: #7360f2; --glass: rgba(0, 0, 0, 0.85); }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000 no-repeat center center fixed; background-size: cover; color: white; min-height: 100vh; overflow-x: hidden; }
        .content-wrap { min-height: 100vh; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        
        header { background: var(--viber); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; position: sticky; top: 0; }
        #notice-bar { background: #f1c40f; color: #000; padding: 10px; font-size: 13px; font-weight: bold; text-align: center; display: none; }
        
        .page { flex: 1; padding-bottom: 90px; }
        .card { background: var(--glass); backdrop-filter: blur(15px); padding: 15px; margin: 12px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); }
        
        .chat-item { display: flex; align-items: center; gap: 15px; padding: 12px; margin: 8px 12px; background: rgba(255,255,255,0.05); border-radius: 15px; cursor: pointer; transition: 0.2s; }
        .chat-item:active { transform: scale(0.98); background: rgba(255,255,255,0.1); }
        
        .p-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #333; }
        .nav-bar { background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; height: 70px; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #222; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #777; cursor: pointer; }
        .nav-item.active { color: white; font-weight: bold; }
        
        input, button, textarea { border-radius: 15px; border: 1px solid #333; padding: 12px; margin: 5px 0; width: 100%; box-sizing: border-box; background: #111; color: white; outline: none; }
        .google-btn { background: white; color: black; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; border: none; cursor: pointer; padding: 12px; border-radius: 25px; }
        
        #chat-window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; flex-direction: column; }
        .msg-bubble { padding: 10px 15px; border-radius: 18px; margin: 5px; max-width: 80%; font-size: 15px; }
    </style>
</head>
<body>

<div class="content-wrap">
    <!-- Auth Page (පිටුව මුලින්ම පෙන්වීමට hidden ඉවත් කර ඇත) -->
    <div id="auth-page" class="page" style="display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;">
        <div class="card" style="width: 100%; max-width: 350px; text-align: center;">
            <h2 style="margin-bottom: 20px;">STORY PRO</h2>
            
            <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid #333;">
                <p style="font-size: 11px; color: #7360f2; margin-bottom: 10px;">ADMIN ACCESS</p>
                <input id="admin-ph" type="tel" placeholder="Phone Number">
                <input id="admin-pw" type="password" placeholder="Password">
                <button onclick="loginAsAdmin()" style="background: #222; border: 1px solid #7360f2;">Enter Admin</button>
            </div>

            <div style="margin: 20px; color: #555; font-size: 12px;">OR</div>

            <button class="google-btn" onclick="loginWithGoogle()">
                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20"> Continue with Gmail
            </button>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="hidden">
        <header>
            <div style="display:flex; align-items:center; gap:8px;">
                <img id="my-p-img" src="" class="p-img" style="width:30px; height:30px;">
                <b id="myn">User</b>
                <div id="adm-area" class="hidden" style="display:flex; gap:5px;">
                    <label for="bg-upload" style="background:red; font-size:9px; padding:4px; border-radius:5px; cursor:pointer;">BG</label>
                    <button onclick="setNotice()" style="background:orange; font-size:9px; border:none; color:black; padding:4px; border-radius:5px;">NOTICE</button>
                    <input type="file" id="bg-upload" class="hidden">
                </div>
            </div>
            <button onclick="logout()" style="width:auto; padding:5px 10px; background:none; border:1px solid #fff; font-size:10px;">Logout</button>
        </header>

        <div id="notice-bar"></div>

        <div id="p-chats" class="page">
            <div style="padding: 10px;">
                <input type="text" id="search-input" placeholder="🔍 Search friends by name..." onkeyup="searchUsers()">
                <div id="search-results"></div>
            </div>
            <h4 style="margin:15px; color:#777; font-size:12px;">MESSAGES</h4>
            <div id="cons"></div>
        </div>

        <div id="p-stories" class="page hidden"><div id="feed"></div></div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="pg('p-chats',this)">💬 Chats</div>
            <div class="nav-item" onclick="pg('p-stories',this)">📖 Feed</div>
            <div class="nav-item" onclick="openStoryModal()">➕ Post</div>
        </nav>
    </div>
</div>

<!-- Chat & Post Windows (Hidden by default) -->
<div id="chat-window" class="hidden">
    <header><span onclick="history.back()" style="cursor:pointer; font-size:20px;">←</span> <b id="chat-name">User</b></header>
    <div id="msg-container" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding:10px; display:flex; gap:5px; background:#111;">
        <input id="msg-input" placeholder="Type here...">
        <button onclick="sendMsg()" style="width:auto; background:var(--viber); border:none; padding:0 15px;">Send</button>
    </div>
</div>

<div id="sm" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:3000; padding:20px; box-sizing:border-box;">
    <h3>New Story</h3>
    <textarea id="si" placeholder="Write something..." rows="5"></textarea>
    <input type="file" id="img-input" accept="image/*">
    <button onclick="postStory()" style="background:var(--viber); border:none; font-weight:bold;">POST</button>
    <button onclick="history.back()" style="background:#333; border:none; margin-top:5px;">CANCEL</button>
</div>

<script>
const firebaseConfig = { databaseURL: "https://story-ceca0-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

const ADMIN_PH = "0712729189", ADMIN_PW = "Thilinak9411@";
let myPh = "", myNm = "", myPic = "", activeChatPh = "", storyImgData = "";

auth.onAuthStateChanged(user => {
    const role = localStorage.getItem("userRole");
    if (user && role === "user") {
        myPh = user.uid; myNm = user.displayName; myPic = user.photoURL;
        db.ref('users/'+myPh).update({name:myNm, pic:myPic});
        showApp();
    } else if (role === "admin") {
        myPh = localStorage.getItem("ph"); myNm = "Admin";
        myPic = "https://cdn-icons-png.flaticon.com/512/6024/6024190.png";
        showApp();
    } else {
        document.getElementById('auth-page').classList.remove('hidden');
        document.getElementById('main-app').classList.add('hidden');
    }
});

function loginAsAdmin() {
    const p = document.getElementById('admin-ph').value, s = document.getElementById('admin-pw').value;
    if(p === ADMIN_PH && s === ADMIN_PW) {
        localStorage.setItem("userRole", "admin");
        localStorage.setItem("ph", p);
        location.reload();
    } else { alert("Error!"); }
}

function loginWithGoogle() {
    localStorage.setItem("userRole", "user");
    auth.signInWithPopup(provider).catch(e => alert(e.message));
}

function showApp() {
    document.getElementById('auth-page').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    document.getElementById('myn').innerText = myNm;
    document.getElementById('my-p-img').src = myPic;
    if(localStorage.getItem("userRole") === "admin") document.getElementById('adm-area').classList.remove('hidden');
    loadStories(); loadFriends();
}

function searchUsers() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const res = document.getElementById('search-results'); res.innerHTML = "";
    if(q.length < 2) return;
    db.ref('users').orderByChild('name').startAt(q).limitToFirst(5).once('value', snap => {
        snap.forEach(u => {
            if(u.key === myPh) return;
            res.innerHTML += `<div class="chat-item"><img src="${u.val().pic}" class="p-img"><div style="flex:1;"><b>${u.val().name}</b></div><button onclick="sendReq('${u.key}','${u.val().name}')" style="width:auto; background:var(--viber); border:none; font-size:10px; padding:5px 10px;">Add</button></div>`;
        });
    });
}

function sendReq(ph, nm) {
    db.ref('friends/'+ph+'/'+myPh).set({status:'pending', name:myNm, pic:myPic});
    alert("Request sent!");
}

function loadFriends() {
    db.ref('friends/'+myPh).on('value', snap => {
        const c = document.getElementById('cons'); c.innerHTML = "";
        snap.forEach(f => {
            const d = f.val();
            if(d.status==='accepted') {
                c.innerHTML += `<div class="chat-item" onclick="openChat('${f.key}','${d.name}','${d.pic}')"><img src="${d.pic}" class="p-img"><div><b>${d.name}</b><br><small style="color:gray;">Tap to chat</small></div></div>`;
            } else if(d.status==='pending') {
                c.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;"><span>Req from <b>${d.name}</b></span><button onclick="acc('${f.key}','${d.name}','${d.pic}')" style="width:auto; background:green; border:none; padding:5px 10px;">Accept</button></div>`;
            }
        });
    });
}

function acc(ph, nm, pic) {
    db.ref('friends/'+myPh+'/'+ph).set({status:'accepted', name:nm, pic:pic});
    db.ref('friends/'+ph+'/'+myPh).set({status:'accepted', name:myNm, pic:myPic});
}

function openChat(ph, name, pic) {
    activeChatPh = ph; document.getElementById('chat-name').innerText = name;
    document.getElementById('chat-window').classList.remove('hidden'); history.pushState({v:'c'}, '');
    const cid = myPh < ph ? myPh+"_"+ph : ph+"_"+myPh;
    db.ref('messages/'+cid).on('value', s => {
        const mc = document.getElementById('msg-container'); mc.innerHTML = "";
        s.forEach(m => {
            const side = m.val().sender === myPh ? 'align-self:flex-end; background:var(--viber);' : 'align-self:flex-start; background:#222;';
            mc.innerHTML += `<div class="msg-bubble" style="${side} padding:10px; border-radius:15px;">${m.val().text}</div>`;
        });
        mc.scrollTop = mc.scrollHeight;
    });
}

function sendMsg() {
    const msg = document.getElementById('msg-input').value; if(!msg.trim()) return;
    const cid = myPh < activeChatPh ? myPh+"_"+activeChatPh : activeChatPh+"_"+myPh;
    db.ref('messages/'+cid).push({sender:myPh, text:msg, time:Date.now()});
    document.getElementById('msg-input').value = "";
}

function loadStories() {
    db.ref('stories').on('value', snap => {
        const f = document.getElementById('feed'); f.innerHTML = "";
        snap.forEach(x => {
            const s = x.val();
            f.insertAdjacentHTML('afterbegin', `<div class="card"><div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;"><img src="${s.uPic}" style="width:30px; height:30px; border-radius:50%;"><b>${s.user}</b></div><div>${s.text}</div>${s.img ? `<img src="${s.img}" style="width:100%; border-radius:10px; margin-top:10px;">` : ''}</div>`);
        });
    });
}

function postStory() {
    const t = document.getElementById('si').value;
    db.ref('stories').push({uPh:myPh, user:myNm, uPic:myPic, text:t, img:storyImgData, time:Date.now()})
    .then(() => { document.getElementById('sm').classList.add('hidden'); history.back(); });
}

function pg(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
}

function logout() { localStorage.clear(); auth.signOut().then(() => location.reload()); }
function openStoryModal() { storyImgData = ""; document.getElementById('sm').classList.remove('hidden'); history.pushState({v:'m'}, ''); }
function setNotice() { const m = prompt("Notice:"); if(m) db.ref('appConfig/notice').set(m); }

document.getElementById('img-input').onchange = e => {
    const r = new FileReader(); r.onload = ev => storyImgData = ev.target.result; r.readAsDataURL(e.target.files[0]);
};
window.onpopstate = () => { document.getElementById('sm').classList.add('hidden'); document.getElementById('chat-window').classList.add('hidden'); };
</script>
</body>
</html>
