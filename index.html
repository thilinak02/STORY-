<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STORY PRO - Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --viber: #7360f2; --bg: #000; --card: #0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; }
        .container { max-width: 500px; margin: auto; padding: 20px; }
        
        /* Login UI */
        .login-box { background: var(--card); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #1a1a1a; margin-top: 50px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 12px; border: none; background: var(--viber); color: white; font-weight: bold; cursor: pointer; }
        
        /* Admin Dashboard */
        .admin-panel { display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #222; }
        .story-card { background: var(--card); padding: 15px; border-radius: 15px; margin-top: 15px; border-left: 5px solid var(--viber); }
        .delete-btn { background: #ff4444; width: auto; padding: 5px 15px; font-size: 12px; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section" class="login-box">
        <h1>STORY PRO</h1>
        <p style="color:var(--viber)">ADMIN ACCESS</p>
        <input id="l-user" type="text" placeholder="Phone Number" value="0712729189">
        <input id="l-pw" type="password" placeholder="Password">
        <button onclick="handleLogin()">Enter Admin</button>
    </div>

    <div id="admin-panel" class="admin-panel">
        <div class="header">
            <h2>Admin Panel</h2>
            <button onclick="logout()" style="width:auto; padding:5px 15px; background:#333;">Logout</button>
        </div>

        <div class="story-card">
            <h3>නව කතාවක් ලියන්න</h3>
            <input id="story-title" type="text" placeholder="කතාවේ මාතෘකාව">
            <textarea id="story-content" rows="5" placeholder="කතාව මෙතන ලියන්න..."></textarea>
            <button onclick="publishStory()">Publish Story</button>
        </div>

        <h3 style="margin-top:30px;">පවතින කතා (Manage Stories)</h3>
        <div id="story-list">
            </div>
    </div>
</div>

<script>
    // ඔබගේ Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyDJ-9NkKH2GCkkLTr6Xr1Y7rz_bj3qJdF0",
      authDomain: "story-ceca0.firebaseapp.com",
      databaseURL: "https://story-ceca0-default-rtdb.firebaseio.com",
      projectId: "story-ceca0",
      storageBucket: "story-ceca0.firebasestorage.app",
      messagingSenderId: "820075788039",
      appId: "1:820075788039:web:421fd811a4b4a3249a77a2"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const ADMIN_PH = "0712729189";
    const ADMIN_PW = "Thilinak9411@";

    // ලොගින් පාලනය
    function handleLogin() {
        const id = document.getElementById('l-user').value.trim();
        const pw = document.getElementById('l-pw').value.trim();

        if (id === ADMIN_PH && pw === ADMIN_PW) {
            showAdminPanel();
        } else {
            alert("වැරදි දත්ත ඇතුළත් කළා!");
        }
    }

    function showAdminPanel() {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        loadStories();
    }

    // කතාවක් Publish කිරීම (Database එකට දැමීම)
    function publishStory() {
        const title = document.getElementById('story-title').value.trim();
        const content = document.getElementById('story-content').value.trim();

        if (!title || !content) return alert("මාතෘකාව සහ කතාව ඇතුළත් කරන්න!");

        const storyId = db.ref('stories').push().key;
        db.ref('stories/' + storyId).set({
            id: storyId,
            title: title,
            content: content,
            date: new Date().toLocaleDateString()
        }).then(() => {
            alert("කතාව සාර්ථකව පල කළා!");
            document.getElementById('story-title').value = "";
            document.getElementById('story-content').value = "";
        });
    }

    // සියලුම කතා Load කිරීම
    function loadStories() {
        db.ref('stories').on('value', (snapshot) => {
            const list = document.getElementById('story-list');
            list.innerHTML = "";
            snapshot.forEach((child) => {
                const data = child.val();
                list.innerHTML += `
                    <div class="story-card">
                        <h4>${data.title}</h4>
                        <p style="font-size:13px; color:#aaa;">${data.content.substring(0, 50)}...</p>
                        <button class="delete-btn" onclick="deleteStory('${data.id}')">Delete Story</button>
                    </div>
                `;
            });
        });
    }

    // කතාවක් මැකීම
    function deleteStory(id) {
        if (confirm("මෙම කතාව මැකීමට ඔබට සහතිකද?")) {
            db.ref('stories/' + id).remove();
        }
    }

    function logout() {
        location.reload();
    }
</script>

</body>
</html>
