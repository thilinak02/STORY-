<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STORY PRO - Login</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        :root { --viber: #7360f2; --bg: #000; --card: #0d0d0d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-box { background: var(--card); padding: 30px; border-radius: 25px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #1a1a1a; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #222; background: #111; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--viber); color: white; font-weight: bold; cursor: pointer; }
        .admin-note { font-size: 10px; color: #222; margin-top: 20px; }
    </style>
</head>
<body>

<div class="login-box">
    <h1>STORY PRO</h1>
    <p id="status-msg" style="font-size:13px; color:#aaa;">Email ලිපිනය හෝ Admin ID ඇතුළත් කරන්න</p>
    
    <div id="login-ui">
        <input id="main-input" type="text" placeholder="Email or Admin ID">
        <input id="pass-input" type="password" placeholder="Password (Only for Admin)">
        <button onclick="handleLogic()">Continue</button>
    </div>

    <div class="admin-note">Secure Access System</div>
</div>

<script>
    // ඔබගේ Firebase දත්ත
    const firebaseConfig = {
      apiKey: "AIzaSyDJ-9NkKH2GCkkLTr6Xr1Y7rz_bj3qJdF0",
      authDomain: "story-ceca0.firebaseapp.com",
      projectId: "story-ceca0",
      storageBucket: "story-ceca0.firebasestorage.app",
      messagingSenderId: "820075788039",
      appId: "1:820075788039:web:421fd811a4b4a3249a77a2"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // ඔබගේ Admin දත්ත
    const SECRET_ID = "0712729189";
    const SECRET_PW = "Thilinak9411@";

    function handleLogic() {
        const val = document.getElementById('main-input').value.trim();
        const pw = document.getElementById('pass-input').value.trim();

        // 1. Admin පරීක්ෂාව
        if (val === SECRET_ID && pw === SECRET_PW) {
            alert("Welcome Admin!");
            // Admin පැනලය තිබෙන පිටුවේ නම මෙතනට දමන්න
            window.location.href = "admin.html"; 
            return;
        }

        // 2. User (Gmail OTP/Link) පරීක්ෂාව
        if (val.includes("@")) {
            sendEmailLink(val);
        } else {
            alert("කරුණාකර නිවැරදි දත්ත ඇතුළත් කරන්න.");
        }
    }

    function sendEmailLink(email) {
        const settings = {
            url: window.location.href,
            handleCodeInApp: true
        };
        auth.sendSignInLinkToEmail(email, settings)
            .then(() => {
                window.localStorage.setItem('emailForSignIn', email);
                alert("Login ලින්ක් එක ඔබගේ Gmail (Inbox) වෙත එවන ලදී.");
            })
            .catch(err => alert("Error: " + err.message));
    }

    // Gmail ලින්ක් එක ක්ලික් කළ පසු ලොග් වීම
    window.addEventListener('load', () => {
        if (auth.isSignInWithEmailLink(window.location.href)) {
            let email = window.localStorage.getItem('emailForSignIn');
            if (!email) email = window.prompt('කරුණාකර තහවුරු කිරීමට ඔබගේ Email එක ඇතුළත් කරන්න:');
            
            auth.signInWithEmailLink(email, window.location.href)
                .then(() => {
                    window.localStorage.removeItem('emailForSignIn');
                    window.location.href = "main_story.html"; // සාමාන්‍ය පරිශීලක පිටුව
                });
        }
    });
</script>
</body>
</html>
