<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STORY PRO - Verified Login</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --viber: #7360f2; --glass: rgba(255, 255, 255, 0.1); }
        body { font-family: sans-serif; margin: 0; background: #000; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: var(--glass); backdrop-filter: blur(15px); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 360px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; border-radius: 12px; border: none; background: var(--viber); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .toggle-text { font-size: 12px; color: #aaa; margin-top: 15px; cursor: pointer; display: block; text-decoration: underline; }
        .hidden { display: none !important; }
        .info { font-size: 11px; color: #ffcc00; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>STORY PRO</h2>
    <span style="color:var(--viber); font-weight:bold;">WELCOME</span>

    <div id="auth-form">
        <input id="user-id" type="text" placeholder="Email (User) / Phone (Admin)">
        <input id="user-pw" type="password" placeholder="Password">
        <button onclick="handleLogin()">Login</button>
        <span class="toggle-text" onclick="toggleForm()">Create New Account (Sign Up)</span>
    </div>

    <div id="signup-form" class="hidden">
        <p class="info">ගිණුම සෑදූ පසු Gmail එකට එන Link එක ක්ලික් කරන්න.</p>
        <input id="reg-email" type="email" placeholder="Enter Your Gmail">
        <input id="reg-pw" type="password" placeholder="New Password (min 6 chars)">
        <button onclick="handleSignup()" style="background: #444;">Send Verification Link</button>
        <span class="toggle-text" onclick="toggleForm()">Back to Login</span>
    </div>
</div>

<script>
    // --- මෙතනට ඔබගේ නිවැරදි Firebase Config එක ඇතුළත් කරන්න ---
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "story-ceca0.firebaseapp.com",
        databaseURL: "https://story-ceca0-default-rtdb.firebaseio.com",
        projectId: "story-ceca0",
        storageBucket: "story-ceca0.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };

    // Firebase Initialize
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.database();

    const ADMIN_PH = "0712729189";
    const ADMIN_PW = "Thilinak9411@";

    // ලොගින් ක්‍රියාවලිය
    function handleLogin() {
        const id = document.getElementById('user-id').value.trim();
        const pw = document.getElementById('user-pw').value.trim();

        if (!id || !pw) { alert("Please fill all fields!"); return; }

        // Admin Login
        if (id === ADMIN_PH && pw === ADMIN_PW) {
            localStorage.setItem("userRole", "admin");
            alert("Welcome Admin!");
            location.href = "index.html"; // ඔබේ ප්‍රධාන පිටුවේ ලින්ක් එක
            return;
        }

        // User Login
        auth.signInWithEmailAndPassword(id, pw)
            .then((userCredential) => {
                if (userCredential.user.emailVerified) {
                    localStorage.setItem("userRole", "user");
                    location.href = "index.html";
                } else {
                    alert("Please verify your email! Check your Gmail inbox.");
                    auth.signOut();
                }
            })
            .catch((error) => { alert("Error: " + error.message); });
    }

    // ගිණුම සෑදීම
    function handleSignup() {
        const email = document.getElementById('reg-email').value.trim();
        const pw = document.getElementById('reg-pw').value.trim();

        if (!email || pw.length < 6) { alert("Valid email and 6+ char password required!"); return; }

        auth.createUserWithEmailAndPassword(email, pw)
            .then((userCredential) => {
                userCredential.user.sendEmailVerification().then(() => {
                    alert("Verification link sent to: " + email);
                    auth.signOut();
                    toggleForm();
                });
            })
            .catch((error) => { alert("Signup Error: " + error.message); });
    }

    function toggleForm() {
        document.getElementById('auth-form').classList.toggle('hidden');
        document.getElementById('signup-form').classList.toggle('hidden');
    }
</script>

</body>
</html>
